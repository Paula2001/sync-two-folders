<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="360" viewBox="0 0 1400 360" role="img" aria-label="make run screenshot 3">
  <rect width="1400" height="360" fill="#0f172a"/>
  <rect x="20" y="20" width="1360" height="320" rx="10" fill="#111827" stroke="#334155"/>
  <circle cx="48" cy="44" r="8" fill="#ef4444"/>
  <circle cx="74" cy="44" r="8" fill="#f59e0b"/>
  <circle cx="100" cy="44" r="8" fill="#22c55e"/>
  <text x="130" y="49" fill="#94a3b8" font-family="Menlo, Monaco, Consolas, monospace" font-size="15">Terminal - application started</text>
  <text x="40" y="94" fill="#e5e7eb" font-family="Menlo, Monaco, Consolas, monospace" font-size="20">The application is running interactively and waiting for menu selection.</text>
  <text x="40" y="132" fill="#cbd5e1" font-family="Menlo, Monaco, Consolas, monospace" font-size="20">Use arrow keys to choose Source / Target / Interval / Log / Config / Read Logs.</text>
  <text x="40" y="170" fill="#cbd5e1" font-family="Menlo, Monaco, Consolas, monospace" font-size="20">Choose Exit to cancel both loops and terminate the app.</text>
