<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="400" viewBox="0 0 1400 400">
  <rect width="1400" height="400" fill="#0b1220"/>
  <rect x="20" y="20" width="1360" height="360" rx="10" fill="#111827" stroke="#334155"/>
  <text x="40" y="60" fill="#93c5fd" font-size="22" font-family="Menlo, monospace">Scenario: Sync UPDATE</text>
  <text x="40" y="105" fill="#cbd5e1" font-size="20" font-family="Menlo, monospace">Source and target both have report.txt</text>
  <text x="40" y="140" fill="#cbd5e1" font-size="20" font-family="Menlo, monospace">MD5 hashes differ</text>
  <text x="40" y="190" fill="#ffffff" font-size="20" font-family="Menlo, monospace">Action: File.Copy(source, target, overwrite: true)</text>
  <text x="40" y="230" fill="#86efac" font-size="20" font-family="Menlo, monospace">Log: { "FileName": "report.txt", "Operation": "UPDATE" }</text>
  <text x="40" y="275" fill="#cbd5e1" font-size="18" font-family="Menlo, monospace">Condition check uses Hash.CompareHash(source, target).</text>
</svg>
